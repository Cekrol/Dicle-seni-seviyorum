<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İ love you?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            background-color: #0d0221;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            font-family: 'Press Start 2P', monospace;
            position: relative;
        }

        /* --- AKIŞKAN NEBULA ARKA PLANI (Pembe, Açık Mavi, Mor, Kırmızı) --- */
        .nebula-bg {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, #ff0055 0%, transparent 45%),
                        radial-gradient(circle at 70% 40%, #7a00ff 0%, transparent 50%),
                        radial-gradient(circle at 40% 80%, #00bfff 0%, transparent 45%),
                        radial-gradient(circle at 80% 70%, #ff3333 0%, transparent 40%);
            filter: blur(70px);
            animation: rotateNebula 25s linear infinite;
            z-index: 0;
        }

        @keyframes rotateNebula {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.15); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        /* --- DAHA GÜÇLÜ PARLAYAN AZ SAYIDA YILDIZLAR --- */
        #starContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            opacity: 0;
            animation: twinkle linear infinite;
            /* Ultra parlama efekti */
            filter: drop-shadow(0 0 8px #ffffff) drop-shadow(0 0 18px rgba(255, 255, 255, 0.9));
        }

        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.2) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.4) rotate(8deg); }
            100% { opacity: 0; transform: scale(0.2) rotate(0deg); }
        }

        /* Buzlu Cam Efektli Premium Pixel Pencere */
        .pixel-window {
            background-color: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 6px double rgba(255, 255, 255, 0.9);
            width: 420px;
            max-width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 2;
        }

        .window-bar {
            border-bottom: 4px solid rgba(255, 255, 255, 0.8);
            padding: 10px;
            display: flex;
            gap: 6px;
        }

        .window-dot {
            width: 8px;
            height: 8px;
            border: 2px solid #ffffff;
        }

        .window-body {
            padding: 45px 20px;
            text-align: center;
        }

        .title-text {
            color: #ffffff;
            font-size: 12pt;
            line-height: 1.7;
            margin: 0 0 40px 0;
            font-weight: normal;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .pixel-btn {
            background: transparent;
            color: #ffffff;
            border: 4px outset #ffffff;
            padding: 12px 24px;
            font-size: 11pt;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            outline: none;
            transition: all 0.1s ease;
        }

        .pixel-btn:hover {
            background: #ffffff;
            color: #000000;
            border: 4px inset #ffffff;
        }

        #noBtn {
            position: relative;
            transition: all 0.2s ease;
            z-index: 50;
        }

        /* --- EVET'E BASINCA AÇILACAK ÖZEL EKRAN --- */
        .special-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.8s ease;
            text-align: center;
            padding: 20px;
        }

        /* Parlayan Romantik Ay Figürü */
        .glowing-moon {
            width: 130px;
            height: 130px;
            filter: drop-shadow(0 0 15px #fffde7) drop-shadow(0 0 30px rgba(255, 253, 231, 0.6));
            margin-bottom: 35px;
            animation: floatMoon 4s ease-in-out infinite;
        }

        @keyframes floatMoon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .love-message {
            color: #ffffff;
            font-size: 14pt;
            line-height: 1.8;
            max-width: 650px;
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.4);
            margin-bottom: 20px;
            font-weight: normal;
        }

        .neon-d {
            color: #ffccff;
            font-size: 28pt;
            text-shadow: 0 0 10px #ffccff, 0 0 25px #ff3399;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="nebula-bg"></div>

    <div id="starContainer"></div>

    <div class="wrapper" id="viewInterface">
        <div class="pixel-window" id="popupWindow">
            <div class="window-bar">
                <span class="window-dot"></span>
                <span class="window-dot"></span>
                <span class="window-dot"></span>
            </div>
            <div class="window-body">
                <h1 class="title-text">Sana bir soru sormak istiyorum...</h1>
                <div class="btn-container">
                    <button class="pixel-btn" onclick="triggerYes()">Yes</button>
                    <button class="pixel-btn" id="noBtn" onmouseover="fleeNo()" onclick="fleeNo()" ontouchstart="fleeNo()">No</button>
                </div>
            </div>
        </div>
    </div>

    <div class="special-screen" id="specialScreen">
        <svg class="glowing-moon" viewBox="0 0 24 24" fill="#fffde7">
            <path d="M12.3,2A10,10,0,0,0,22,11.7a1,1,0,0,1,1,1.1,10,10,0,1,1-11.8-11.8,1,1,0,0,1,1.1,1Z"/>
        </svg>
        <h2 class="love-message">ne kadar tartissakta seni seviyorum</h2>
        <div class="neon-d">D 🫠</div>
    </div>

    <script>
        // Sayısı azaltılmış ama çok daha güçlü parlayan yıldızlar
        function createStars() {
            const container = document.getElementById('starContainer');
            const starCount = 20; // 80'den 20'ye düşürerek sadeleştirdik

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                star.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="#ffffff" style="width:100%; height:100%;">
                        <path d="M12 0 Q12 12 24 12 Q12 12 12 24 Q12 12 0 12 Q12 12 12 0 Z"/>
                    </svg>
                `;
                
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                
                // Yıldızların boyutu (Daha belirgin parlamaları için hafif büyütüldü)
                const size = Math.random() * 14 + 14; 
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                const duration = Math.random() * 2.5 + 2; 
                const delay = Math.random() * 4;
                star.style.animationDuration = duration + 's';
                star.style.animationDelay = delay + 's';
                
                container.appendChild(star);
            }
        }

        createStars();

        // Yes butonuna basınca olacak sihirli an
        function triggerYes() {
            const ui = document.getElementById('viewInterface');
            const special = document.getElementById('specialScreen');
            
            ui.style.opacity = '0';
            
            setTimeout(() => {
                ui.style.display = 'none';
                special.style.display = 'flex';
                setTimeout(() => {
                    special.style.opacity = '1';
                }, 50);
            }, 500);
        }

        // Kaçan No Butonu
        function fleeNo() {
            const noBtn = document.getElementById('noBtn');
            
            const maxX = window.innerWidth - noBtn.offsetWidth - 40;
            const maxY = window.innerHeight - noBtn.offsetHeight - 40;
            
            const randomX = Math.max(20, Math.floor(Math.random() * maxX));
            const randomY = Math.max(20, Math.floor(Math.random() * maxY));
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }
    </script>
</body>
</html>
