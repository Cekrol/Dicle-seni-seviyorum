<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            font-family: 'Press Start 2P', monospace;
            position: relative;
        }

        /* --- 1. ADIM: GİRİŞTEKİ PARMAK İZİ KİLİT EKRANI (FOTOĞRAFIN AYNISI) --- */
        #lockScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 99999; /* Her şeyin en üstünde başlar */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s ease-in-out, visibility 1.5s ease-in-out; /* Yavaşça açılması için */
        }

        .lock-title {
            font-family: 'Dancing Script', cursive;
            color: #ffffff;
            font-size: 32pt;
            margin-bottom: 50px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
            user-select: none;
        }

        /* Dairesel Tarayıcı Alanı */
        .scanner-container {
            position: relative;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 3px solid rgba(255, 45, 85, 0.2);
            border-top: 3px solid #ff2d55;
            border-bottom: 3px solid #ff2d55;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px rgba(255, 45, 85, 0.2);
            cursor: pointer;
            animation: spinRing 4s linear infinite;
            user-select: none;
            -webkit-user-select: none;
        }

        @keyframes spinRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Döndürmeden sabit duran iç parmak izi yuvası */
        .scanner-inner {
            position: absolute;
            width: 150px;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: rotate(0deg); /* Dış halkanın dönüşünü nötrlemek için sabit */
            animation: stopSpin 4s linear infinite reverse;
            overflow: hidden; /* Lazerin dışarı taşmaması için */
        }

        @keyframes stopSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fingerprint-svg {
            width: 110px;
            height: 140px;
            fill: none;
            stroke: #ff2d55;
            stroke-width: 10;
            stroke-linecap: round;
            filter: drop-shadow(0 0 8px #ff2d55);
            transition: filter 0.3s ease, stroke 0.3s ease;
        }

        /* Sürekli inip kalkan kırmızı lazer çizgisi */
        .laser-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 5px;
            background: #ff2d55;
            box-shadow: 0 0 15px #ff2d55, 0 0 25px #ff2d55;
            animation: scanMotion 2.2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes scanMotion {
            0% { top: 10%; }
            50% { top: 90%; }
            100% { top: 10%; }
        }

        /* Basılı tutarken tarayıcının tepki vermesi */
        .scanner-container:active .fingerprint-svg {
            stroke: #ff66cc;
            filter: drop-shadow(0 0 18px #ff66cc);
        }

        .scanner-container:active .laser-line {
            background: #ff66cc;
            box-shadow: 0 0 20px #ff66cc, 0 0 35px #ff66cc;
            animation-duration: 0.8s; /* Basılı tutunca lazer hızlanır */
        }

        .lock-footer {
            font-family: Arial, sans-serif;
            font-style: italic;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14pt;
            margin-top: 50px;
            letter-spacing: 1px;
            user-select: none;
        }

        /* --- KÜÇÜK VE ZARİF PARLAYAN YILDIZLAR --- */
        #starContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle linear infinite;
        }

        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.3); }
        }

        .wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        /* Klasik Pixel Pencere Tasarımı */
        .pixel-window {
            background-color: rgba(5, 5, 5, 0.9);
            border: 6px double #ffffff;
            width: 440px;
            max-width: 90%;
            box-shadow: 0 0 25px rgba(255,255,255,0.1);
            z-index: 2;
        }

        .window-bar {
            border-bottom: 4px solid #ffffff;
            padding: 10px;
            display: flex;
            gap: 6px;
        }

        .window-dot {
            width: 8px;
            height: 8px;
            border: 2px solid #ffffff;
        }

        .window-body {
            padding: 45px 20px;
            text-align: center;
        }

        .title-text {
            color: #ffffff;
            font-size: 11pt;
            line-height: 1.8;
            margin: 0 0 40px 0;
            font-weight: normal;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn-wrapper {
            width: 100px; 
            display: flex;
            justify-content: center;
        }

        .pixel-btn {
            background: transparent;
            color: #ffffff;
            border: 4px outset #ffffff;
            padding: 12px 24px;
            font-size: 11pt;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            outline: none;
        }

        .pixel-btn:hover {
            background: #ffffff;
            color: #000000;
            border: 4px inset #ffffff;
        }

        #noBtn {
            position: relative;
            z-index: 9999;
        }

        /* --- EVET EKRANI VE GEOMETRİK KALP ALANI --- */
        .special-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        #heartCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 21;
        }

        /* Kalbin Ortasında Parlayan Pembe D Yazısı */
        .center-d {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 25;
            color: #ff66cc;
            font-size: 50pt;
            font-family: 'Press Start 2P', monospace;
            opacity: 0;
            transition: opacity 3s ease-in-out;
            text-shadow: 0 0 15px #ff66cc, 0 0 30px #ff007f, 0 0 50px #ff0055;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="lockScreen">
        <div class="lock-title">elini ekrana basılı tut</div>
        
        <div class="scanner-container" id="scannerZone" onmousedown="startScan()" onmouseup="cancelScan()" onmouseleave="cancelScan()" ontouchstart="startScan(event)" ontouchend="cancelScan(event)">
            <div class="scanner-inner">
                <div class="laser-line"></div>
                <svg class="fingerprint-svg" viewBox="0 0 512 512">
                    <path d="M256,440 C320,440 360,400 360,320 C360,220 290,160 256,160 C222,160 152,220 152,320 C152,350 160,380 180,410" />
                    <path d="M210,425 C200,410 192,380 192,320 C192,250 230,200 256,200 C282,200 320,250 320,320 C320,380 300,410 280,425" />
                    <path d="M256,360 C270,360 280,340 280,320 C280,280 265,240 256,240 C247,240 232,280 232,320 C232,340 242,360 256,360" />
                    <path d="M120,320 C120,180 200,120 256,120 C312,120 392,180 392,320 C392,410 330,460 256,460 C210,460 160,440 130,410" />
                    <path d="M90,340 C90,150 180,80 256,80 C332,80 422,150 422,340 C422,430 370,490 256,490" />
                </svg>
            </div>
        </div>

        <div class="lock-footer">🔒</div>
    </div>

    <div id="starContainer"></div>

    <div class="wrapper" id="viewInterface">
        <div class="pixel-window">
            <div class="window-bar">
                <span class="window-dot"></span>
                <span class="window-dot"></span>
                <span class="window-dot"></span>
            </div>
            <div class="window-body">
                <h1 class="title-text">Ne kadar tartışsakda seni seviyorum peki sen?</h1>
                <div class="btn-container">
                    <div class="btn-wrapper">
                        <button class="pixel-btn" onclick="triggerYes()">Yes</button>
                    </div>
                    <div class="btn-wrapper">
                        <button class="pixel-btn" id="noBtn" onmouseover="fleeNo(event)" ontouchstart="fleeNo(event)">No</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="special-screen" id="specialScreen">
        <canvas id="heartCanvas"></canvas>
        <div class="center-d" id="letterD">D</div>
    </div>

    <script>
        // --- PARMAK İZİ TARAMA MANTIĞI ---
        let scanTimer = null;

        function startScan(e) {
            if (e && e.cancelable) e.preventDefault(); // Telefonlar için çift tıklama engelleme
            
            // Eğer zaten tarama başladıysa tekrar tetikleme
            if (scanTimer) return;

            // 1.5 Saniye basılı tutulursa kilit yavaşça açılır
            scanTimer = setTimeout(() => {
                const lock = document.getElementById('lockScreen');
                lock.style.opacity = '0';
                lock.style.visibility = 'hidden';
            }, 1500);
        }

        function cancelScan(e) {
            // Elini erken çekerse tarama sıfırlanır
            if (scanTimer) {
                clearTimeout(scanTimer);
                scanTimer = null;
            }
        }

        // Arka plandaki küçük zarif yıldızlar
        function createSmallStars() {
            const container = document.getElementById('starContainer');
            const starCount = 40; 

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                
                const size = Math.random() * 2 + 1.5; 
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                star.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                star.style.animationDelay = (Math.random() * 3) + 's';
                
                container.appendChild(star);
            }
        }
        createSmallStars();

        // Akıllı Kaçan No Butonu
        function fleeNo(e) {
            if (e && e.type === 'touchstart') e.preventDefault();
            
            const btn = document.getElementById('noBtn');
            if (btn.style.position !== 'fixed') {
                const rect = btn.getBoundingClientRect();
                btn.style.position = 'fixed';
                btn.style.left = rect.left + 'px';
                btn.style.top = rect.top + 'px';
                btn.style.transition = 'all 0.25s ease';
            }

            setTimeout(() => {
                const maxX = window.innerWidth - btn.offsetWidth - 30;
                const maxY = window.innerHeight - btn.offsetHeight - 30;
                
                const randomX = Math.max(30, Math.floor(Math.random() * maxX));
                const randomY = Math.max(30, Math.floor(Math.random() * maxY));
                
                btn.style.left = randomX + 'px';
                btn.style.top = randomY + 'px';
            }, 10);
        }

        // Evet'e basınca geçiş mekanizması
        function triggerYes() {
            const ui = document.getElementById('viewInterface');
            const special = document.getElementById('specialScreen');
            const letterD = document.getElementById('letterD');
            
            ui.style.opacity = '0';
            
            setTimeout(() => {
                ui.style.display = 'none';
                special.style.display = 'block';
                setTimeout(() => {
                    special.style.opacity = '1';
                    startComplexPlexusHeart();
                    
                    setTimeout(() => {
                        letterD.style.opacity = '1';
                    }, 1200);
                }, 50);
            }, 500);
        }

        // --- KAÇMAYA ÇALIŞAN ÇİZGİLER VE PARÇACIK MOTORU (PLEXUS MESH WITH REPEL) ---
        // Fare ve Dokunmatik takibi için konum objesi
        const mouse = { x: null, y: null, radius: 100 }; // 100px etkileşim yarıçapı

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                mouse.x = e.touches[0].clientX;
                mouse.y = e.touches[0].clientY;
            }
        });
        window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });
        window.addEventListener('touchend', () => { mouse.x = null; mouse.y = null; });

        function startComplexPlexusHeart() {
            const canvas = document.getElementById('heartCanvas');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            const particles = [];
            const particleCount = 180; 

            function getHeartPoint(t) {
                const scale = Math.min(canvas.width, canvas.height) / 30; 
                return {
                    x: scale * 16 * Math.pow(Math.sin(t), 3),
                    y: -scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
                };
            }

            class HeartParticle {
                constructor(targetT) {
                    this.targetT = targetT;
                    this.basePoint = getHeartPoint(this.targetT);
                    
                    this.x = canvas.width / 2 + this.basePoint.x + (Math.random() - 0.5) * 30;
                    this.y = canvas.height / 2 + this.basePoint.y + (Math.random() - 0.5) * 30;
                    
                    this.speed = 0.05; // Geri dönüş hızı esnekliği
                    this.radius = Math.random() * 1.5 + 1;
                    this.vibrationSeed = Math.random() * 100;
                }

                update(pulseFactor) {
                    const targetX = canvas.width / 2 + this.basePoint.x * pulseFactor;
                    const targetY = canvas.height / 2 + this.basePoint.y * pulseFactor;

                    this.vibrationSeed += 0.05;
                    const jitterX = Math.sin(this.vibrationSeed) * 3;
                    const jitterY = Math.cos(this.vibrationSeed) * 3;

                    // Orijinal durması gereken yer
                    let destX = targetX + jitterX;
                    let destY = targetY + jitterY;

                    // KAÇMAYA ÇALIŞAN ÇİZGİLER (MOUSE REPEL FİZİĞİ)
                    if (mouse.x !== null && mouse.y !== null) {
                        const dx = this.x - mouse.x;
                        const dy = this.y - mouse.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < mouse.radius) {
                            const force = (mouse.radius - distance) / mouse.radius;
                            const angle = Math.atan2(dy, dx);
                            // Fare yaklaştıkça noktaları ve dolayısıyla çizgileri dışa doğru fırlatır
                            destX += Math.cos(angle) * force * 120; 
                            destY += Math.sin(angle) * force * 120;
                        }
                    }

                    // Fiziksel itme ivmesi uygulaması
                    this.x += (destX - this.x) * this.speed;
                    this.y += (destY - this.y) * this.speed;
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = '#ffffff';
                    ctx.fill();
                }
            }

            for (let i = 0; i < particleCount; i++) {
                const t = (i / particleCount) * Math.PI * 2;
                particles.push(new HeartParticle(t));
            }

            let timeCounter = 0;

            function renderLoop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                timeCounter += 0.04;

                const pulseFactor = 1 + 0.08 * Math.sin(timeCounter * 1.5);

                particles.forEach(p => {
                    p.update(pulseFactor);
                    p.draw();
                });

                ctx.shadowBlur = 0; 
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < 65) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            
                            const opacity = (1 - distance / 65) * 0.4;
                            ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
                            ctx.lineWidth = 0.6;
                            ctx.stroke();
                        }
                    }
                }

                requestAnimationFrame(renderLoop);
            }

            renderLoop();
        }
    </script>
</body>
</html>
